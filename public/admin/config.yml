# publish_mode: editorial_workflow
backend:
  name: git-gateway
  branch: main
media_folder: "public/uploads"
public_folder: "/uploads"
locale: "es"
editor:
  preview: false

collections:
  - name: "expeditions"
    label: "Expediciones"
    label_singular: "Expedición"
    folder: "src/content/expeditions"
    create: true
    slug: "{{slug}}"
    identifier_field: "title.es"
    summary: "{{title.es}}"
    fields:
      - { label: "Destacada", name: "featured", widget: "boolean", default: false }
      - label: "Título"
        name: "title"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
      - { label: "Slug personalizado (opcional)", name: "slug", widget: "string", required: false, hint: "Ej: mi-aventura-especial. Si se deja vacío se usa el nombre del archivo." }
      - label: "Resumen"
        name: "summary"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
      - label: "Descripción (párrafos debajo del resumen)"
        name: "details"
        widget: "object"
        required: false
        hint: "Texto largo con párrafos que aparece debajo del resumen. Admite markdown."
        fields:
          - { label: "Español", name: "es", widget: "markdown", required: false }
          - { label: "English", name: "en", widget: "markdown", required: false }
      - label: "Ubicación"
        name: "location"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
      - { label: "País", name: "country", widget: "select", options: ["CL","PE","AR","BO"], default: "CL" }
      - { label: "Duración (días)", name: "durationDays", widget: "number", value_type: "int", min: 1 }
      - { label: "Dificultad", name: "difficulty", widget: "select", options: ["easy","moderate","demanding","difficult","expedition"] }
      - label: "Temporada"
        name: "season"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
      - { label: "Cupos totales", name: "maxSpots", widget: "number", required: false, value_type: "int" }
      - { label: "Precio desde", name: "priceFrom", widget: "number", required: false, value_type: "int" }
      - { label: "Moneda", name: "currency", widget: "select", options: ["USD","CLP"], default: "USD" }
      - { label: "Estado", name: "status", widget: "select", options: ["open","soon","closed"], default: "open" }
      - { label: "Imagen portada", name: "cover", widget: "image", hint: "Ideal: 1200x800px, formato WebP o JPG, máx 500KB" }
      - { label: "Galería", name: "gallery", widget: "list", required: false, hint: "Ideal: 1200x800px, formato WebP o JPG, máx 500KB por imagen", field: { label: "Imagen", name: "image", widget: "image" } }
      - label: "Fechas disponibles"
        name: "dates"
        widget: "list"
        required: false
        fields:
          - { label: "Inicio", name: "start", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
          - { label: "Fin", name: "end", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
          - { label: "Cupos", name: "spots", widget: "number", required: false, value_type: "int" }
      - label: "Incluye"
        name: "includes"
        widget: "object"
        required: false
        fields:
          - { label: "Español", name: "es", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "English", name: "en", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
      - label: "No incluye"
        name: "excludes"
        widget: "object"
        required: false
        fields:
          - { label: "Español", name: "es", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "English", name: "en", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
      - label: "Itinerario"
        name: "itinerary"
        widget: "list"
        required: false
        fields:
          - { label: "Día", name: "day", widget: "number", value_type: "int", min: 1 }
          - label: "Título"
            name: "title"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Descripción"
            name: "body"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "text" }
              - { label: "English", name: "en", widget: "text" }
      - { label: "Orden", name: "order", widget: "number", value_type: "int", default: 100 }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }
      - { label: "Video (URL YouTube / Vimeo)", name: "video", widget: "string", required: false, hint: "URL completa del video. Ej: https://youtu.be/abc123 o https://www.youtube.com/watch?v=abc123" }

  - name: "courses"
    label: "Cursos"
    label_singular: "Curso"
    folder: "src/content/courses"
    create: true
    slug: "{{slug}}"
    identifier_field: "title.es"
    summary: "{{title.es}}"
    fields:
      - { label: "Destacado", name: "featured", widget: "boolean", default: false }
      - label: "Título"
        name: "title"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
      - { label: "Slug personalizado (opcional)", name: "slug", widget: "string", required: false, hint: "Ej: mi-aventura-especial. Si se deja vacío se usa el nombre del archivo." }
      - label: "Resumen"
        name: "summary"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
      - label: "Descripción (párrafos debajo del resumen)"
        name: "details"
        widget: "object"
        required: false
        hint: "Texto largo con párrafos que aparece debajo del resumen. Admite markdown."
        fields:
          - { label: "Español", name: "es", widget: "markdown", required: false }
          - { label: "English", name: "en", widget: "markdown", required: false }
      - { label: "Nivel", name: "level", widget: "select", options: ["intro","intermediate","advanced"] }
      - { label: "Duración (días)", name: "durationDays", widget: "number", value_type: "int", min: 1 }
      - label: "Ubicación"
        name: "location"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
      - { label: "Precio desde", name: "priceFrom", widget: "number", required: false, value_type: "int" }
      - { label: "Moneda", name: "currency", widget: "select", options: ["CLP","USD"], default: "CLP" }
      - { label: "Cupos máximos", name: "maxStudents", widget: "number", required: false, value_type: "int" }
      - label: "Requisitos"
        name: "requirements"
        widget: "object"
        required: false
        fields:
          - { label: "Español", name: "es", widget: "list", field: { label: "Requisito", name: "item", widget: "string" } }
          - { label: "English", name: "en", widget: "list", field: { label: "Requirement", name: "item", widget: "string" } }
      - label: "Incluye"
        name: "includes"
        widget: "object"
        required: false
        fields:
          - { label: "Español", name: "es", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "English", name: "en", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
      - label: "No incluye"
        name: "excludes"
        widget: "object"
        required: false
        fields:
          - { label: "Español", name: "es", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "English", name: "en", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
      - label: "Itinerario"
        name: "itinerary"
        widget: "list"
        required: false
        fields:
          - { label: "Día", name: "day", widget: "number", value_type: "int", min: 1 }
          - label: "Título"
            name: "title"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Descripción"
            name: "body"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "text" }
              - { label: "English", name: "en", widget: "text" }
      - { label: "Imagen portada", name: "cover", widget: "image", hint: "Ideal: 1200x800px, formato WebP o JPG, máx 500KB" }
      - { label: "Galería", name: "gallery", widget: "list", required: false, hint: "Ideal: 1200x800px, formato WebP o JPG, máx 500KB por imagen", field: { label: "Imagen", name: "image", widget: "image" } }
      - label: "Fechas disponibles"
        name: "dates"
        widget: "list"
        required: false
        fields:
          - { label: "Inicio", name: "start", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
          - { label: "Fin", name: "end", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
          - { label: "Cupos", name: "spots", widget: "number", required: false, value_type: "int" }
      - { label: "Orden", name: "order", widget: "number", value_type: "int", default: 100 }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }
      - { label: "Video (URL YouTube / Vimeo)", name: "video", widget: "string", required: false, hint: "URL completa del video. Ej: https://youtu.be/abc123 o https://www.youtube.com/watch?v=abc123" }

  - name: "team"
    label: "Equipo"
    label_singular: "Persona"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - label: "Rol"
        name: "role"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
      - label: "Bio"
        name: "bio"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
      - { label: "Foto", name: "photo", widget: "image", hint: "Ideal: 400x400px (cuadrada), formato WebP o JPG, máx 200KB" }
      - { label: "Certificaciones", name: "certifications", widget: "list", field: { label: "Cert", name: "cert", widget: "string" } }
      - { label: "Orden", name: "order", widget: "number", value_type: "int", default: 100 }

  - name: "testimonials"
    label: "Testimonios"
    label_singular: "Testimonio"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} - {{expedition.es}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Foto (opcional)", name: "photo", widget: "image", required: false, hint: "Ideal: 200x200px (cuadrada), formato WebP o JPG, máx 100KB" }
      - { label: "Iniciales", name: "initials", widget: "string" }
      - { label: "Color iniciales", name: "color", widget: "color", default: "#2a3e55" }
      - label: "Texto"
        name: "text"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "text" }
          - { label: "English", name: "en", widget: "text" }
      - label: "Actividad realizada"
        name: "expedition"
        widget: "object"
        fields:
          - { label: "Español", name: "es", widget: "string" }
          - { label: "English", name: "en", widget: "string" }
      - { label: "Orden", name: "order", widget: "number", value_type: "int", default: 100 }

  - name: "legal"
    label: "Páginas Legales"
    files:
      - file: "src/content/site/terms.md"
        label: "Términos y Condiciones"
        name: "terms"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "terms" }
          - label: "Título"
            name: "title"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Contenido"
            name: "content"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "markdown" }
              - { label: "English", name: "en", widget: "markdown" }

      - file: "src/content/site/privacy.md"
        label: "Política de Privacidad"
        name: "privacy"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "privacy" }
          - label: "Título"
            name: "title"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Contenido"
            name: "content"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "markdown" }
              - { label: "English", name: "en", widget: "markdown" }

  - name: "site"
    label: "Personalización del sitio"
    files:
      - file: "src/content/site/header.md"
        label: "Cabecera (Header)"
        name: "header"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "header" }
          - { label: "Logo principal", name: "logo", widget: "image", hint: "Ideal: Formato PNG transparente o SVG, máx 200KB" }
          - label: "Texto Logo"
            name: "logoText"
            widget: "object"
            fields:
              - { label: "Texto arriba", name: "top", widget: "string" }
              - { label: "Texto abajo", name: "bottom", widget: "string" }
          - label: "Botón de reserva"
            name: "bookButton"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Navegación"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Expediciones", name: "expeditions", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - { label: "Formación", name: "training", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - { label: "Nosotros", name: "about", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - { label: "Calendario", name: "calendar", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }

      - file: "src/content/site/hero.md"
        label: "Hero (Inicio)"
        name: "hero"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "hero" }
          - label: "Ceja (Eyebrow)"
            name: "eyebrow"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Título principal"
            name: "title"
            widget: "object"
            hint: "Usa \\n para saltos de línea"
            fields:
              - { label: "Español", name: "es", widget: "text" }
              - { label: "English", name: "en", widget: "text" }
          - label: "Texto destacado del título"
            name: "titleHighlight"
            widget: "object"
            hint: "Frase o línea que se resaltará en amarillo dentro del título"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Subtítulo"
            name: "subtitle"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "text" }
              - { label: "English", name: "en", widget: "text" }
          - label: "Botón Principal (Expediciones)"
            name: "primaryButton"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Botón Secundario (Cotizar)"
            name: "secondaryButton"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Imágenes de fondo del hero"
            name: "backgroundFrames"
            widget: "list"
            fields:
              - { label: "Imagen", name: "image", widget: "image" }
              - { label: "Posición de fondo", name: "position", widget: "string", hint: "Ej: center top, center 38%, 50% 20%" }

      - file: "src/content/site/about.md"
        label: "Sección Nosotros (Valores)"
        name: "about"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "about" }
          - label: "Ceja de la sección"
            name: "eyebrow"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Título de la sección"
            name: "title"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Valores"
            name: "values"
            widget: "list"
            fields:
              - label: "Título"
                name: "title"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "Cuerpo"
                name: "body"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "text" }
                  - { label: "English", name: "en", widget: "text" }

      - file: "src/content/site/testimonials.md"
        label: "Títulos de Testimonios"
        name: "testimonials_config"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "testimonials" }
          - label: "Ceja (Eyebrow)"
            name: "eyebrow"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Título"
            name: "title"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

      - file: "src/content/site/home-sections.md"
        label: "Secciones Home"
        name: "home_sections"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "home_sections" }
          - label: "Expediciones"
            name: "expeditions"
            widget: "object"
            fields:
              - { label: "Ceja", name: "eyebrow", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - { label: "Título", name: "title", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - { label: "Botón", name: "button", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - label: "Filtros"
                name: "filters"
                widget: "object"
                fields:
                  - { label: "Todas", name: "all", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
                  - { label: "Chile", name: "chile", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
                  - { label: "Internacional", name: "international", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
          - label: "Formación"
            name: "training"
            widget: "object"
            fields:
              - { label: "Ceja", name: "eyebrow", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - { label: "Título", name: "title", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }
              - { label: "Botón", name: "button", widget: "object", fields: [{ label: "Español", name: "es", widget: "string" }, { label: "English", name: "en", widget: "string" }] }

      - file: "src/content/site/cta.md"
        label: "Sección CTA (¿Tienes un plan?)"
        name: "cta"
        fields:
          - { label: "Tipo", name: "type", widget: "hidden", default: "cta" }
          - label: "Título"
            name: "title"
            widget: "object"
            hint: "Usa \\n para saltos de línea"
            fields:
              - { label: "Español", name: "es", widget: "text" }
              - { label: "English", name: "en", widget: "text" }
          - label: "Texto destacado del título"
            name: "titleHighlight"
            widget: "object"
            hint: "Frase exacta que se mostrará destacada en amarillo"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Subtítulo"
            name: "subtitle"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "text" }
              - { label: "English", name: "en", widget: "text" }
          - label: "Texto del botón"
            name: "button"
            widget: "object"
            fields:
              - { label: "Español", name: "es", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "Etiquetas destacadas"
            name: "features"
            widget: "list"
            fields:
              - label: "Texto"
                name: "label"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
          - label: "Nota bajo el botón"
            name: "responseNote"
            widget: "object"
            fields:

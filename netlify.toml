[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ─── Edge functions ───────────────────────────────────────────────────────────

[[edge_functions]]
  path = "/"
  function = "lang-redirect"

# ─── Redirects ────────────────────────────────────────────────────────────────

# Admin CMS
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# English routes — explicit 200 rewrites so Netlify serves
# the pre-rendered HTML without any language-detection redirect
[[redirects]]
  from = "/en"
  to = "/en/index.html"
  status = 200

[[redirects]]
  from = "/en/expeditions"
  to = "/en/expeditions/index.html"
  status = 200

[[redirects]]
  from = "/en/expeditions/:slug"
  to = "/en/expeditions/:slug/index.html"
  status = 200

[[redirects]]
  from = "/en/training"
  to = "/en/training/index.html"
  status = 200

[[redirects]]
  from = "/en/about"
  to = "/en/about/index.html"
  status = 200

[[redirects]]
  from = "/en/contact"
  to = "/en/contact/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# ─── Security headers (all pages) ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Stop MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Control referrer info sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features not needed by this site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Basic XSS protection for older browsers
    X-XSS-Protection = "1; mode=block"
    # Content Security Policy:
    # - default: same origin
    # - scripts: same origin + Netlify Identity widget + Google Fonts
    # - styles: same origin + Google Fonts + inline (needed by Tailwind)
    # - images: same origin + uploaded assets + placeholder SVGs
    # - scripts: same origin + Netlify Identity widget + Google Fonts
    # - frames: Netlify Identity needs it for the login popup
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://identity.netlify.com https://unpkg.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com; connect-src 'self' https://*.netlify.com https://*.netlify.app; frame-src https://identity.netlify.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'none'"

# ─── Admin: no indexing & relaxed CSP for Decap CMS ──────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    # Decap CMS requires unsafe-eval and connections to unpkg to function properly
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com; connect-src 'self' https://*.netlify.com https://*.netlify.app https://unpkg.com; frame-src https://identity.netlify.com; object-src 'none'; base-uri 'self'; form-action 'self'"


# ─── Static assets: aggressive caching ───────────────────────────────────────
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
